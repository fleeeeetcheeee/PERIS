# TradingAgents (arXiv:2412.20138) config. Validated by tradingagents.config.
tickers: [AAPL, MSFT, NVDA]
benchmark: SPY

debate_rounds: 2
risk_rounds: 1

# null = auto-detect the installed Ollama model for both roles
quick_model: null
deep_model: null
temperature: 0.2
llm_timeout: 300.0

conviction_weights:
  LOW: 0.33
  MEDIUM: 0.66
  HIGH: 1.0

# ~26 sessions x 3 tickers = ~78 LLM decisions per full eval run (cached)
eval_start: 2026-01-02
eval_end: null
cadence_sessions: 5
cost_bps_per_side: 7.5
horizon_sessions: 5
memory_lessons: 3

# Live watch mode: during NYSE hours poll delayed quotes; a move >= watch_move_pct
# vs yesterday's close triggers a fresh agent review with the intraday update
# injected (max one per ticker per revision_cooldown_minutes). macOS notification
# whenever the desk's stance on a ticker becomes BUY or SELL.
watch_enabled: true
watch_poll_minutes: 10
watch_move_pct: 2.5
revision_cooldown_minutes: 90
notify: true
notify_all: false
