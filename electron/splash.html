<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PERIS — Starting</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #0f0f1a;
      color: #e2e8f0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      user-select: none;
      -webkit-app-region: drag;
    }

    .logo-block {
      display: flex;
      flex-direction: column;
      align-items: center;
      margin-bottom: 48px;
    }

    .logo-mark {
      width: 72px;
      height: 72px;
      background: linear-gradient(135deg, #1e3a5f 0%, #2563eb 100%);
      border-radius: 18px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 26px;
      font-weight: 800;
      color: #fff;
      letter-spacing: -1px;
      margin-bottom: 20px;
      box-shadow: 0 8px 32px rgba(37, 99, 235, 0.35);
    }

    .app-name {
      font-size: 32px;
      font-weight: 700;
      letter-spacing: 4px;
      color: #f8fafc;
      text-transform: uppercase;
    }

    .app-subtitle {
      font-size: 12px;
      color: #64748b;
      letter-spacing: 2px;
      text-transform: uppercase;
      margin-top: 6px;
    }

    .progress-container {
      width: 280px;
      margin-bottom: 20px;
    }

    .progress-track {
      height: 3px;
      background: #1e293b;
      border-radius: 2px;
      overflow: hidden;
    }

    .progress-bar {
      height: 100%;
      background: linear-gradient(90deg, #2563eb, #60a5fa);
      border-radius: 2px;
      width: 0%;
      transition: width 0.4s ease;
    }

    .status-text {
      font-size: 12px;
      color: #475569;
      text-align: center;
      margin-top: 14px;
      letter-spacing: 0.3px;
      min-height: 18px;
      transition: opacity 0.3s ease;
    }

    .spinner {
      display: inline-block;
      width: 18px;
      text-align: left;
    }

    .version {
      position: absolute;
      bottom: 24px;
      font-size: 11px;
      color: #1e293b;
    }
  </style>
</head>
<body>
  <div class="logo-block">
    <div class="logo-mark">PE</div>
    <div class="app-name">PERIS</div>
    <div class="app-subtitle">Private Equity Intelligence</div>
  </div>

  <div class="progress-container">
    <div class="progress-track">
      <div class="progress-bar" id="bar"></div>
    </div>
    <div class="status-text" id="status">Initialising...</div>
  </div>

  <div class="version">v0.1.0</div>

  <script>
    const bar = document.getElementById('bar');
    const statusEl = document.getElementById('status');

    const steps = [
      { pct: 15, msg: 'Starting database...' },
      { pct: 35, msg: 'Loading models...' },
      { pct: 60, msg: 'Starting API server...' },
      { pct: 80, msg: 'Launching dashboard...' },
      { pct: 100, msg: 'Ready.' },
    ];

    function setProgress(pct, msg) {
      bar.style.width = pct + '%';
      statusEl.textContent = msg;
    }

    // Listen for IPC status updates from main process
    if (window.peris) {
      window.peris.onStatusUpdate(function(data) {
        const step = data.step || 0;
        const message = data.message;
        const s = steps[step] || steps[steps.length - 1];
        setProgress(s.pct, message || s.msg);
      });
    } else {
      // Fallback animation if preload not wired yet
      var current = 0;
      function tick() {
        if (current < steps.length) {
          var s = steps[current++];
          setProgress(s.pct, s.msg);
          if (current < steps.length) setTimeout(tick, 900);
        }
      }
      setTimeout(tick, 300);
    }
  </script>
</body>
</html>
